description: 'Superblocks is a programmable internal tools platform that enables engineering
  and IT teams to build, govern, and deploy enterprise-grade internal applications,
  workflows, and scheduled jobs on top of databases, REST APIs, GraphQL APIs, and
  50+ SaaS integrations. The platform exposes a REST management API at api.superblocks.com/v1
  that supports full CRUD operations for applications and workflows, authenticated
  via API key or Bearer JWT. Superblocks supports three deployment models—fully managed
  cloud, hybrid (control plane managed, data in user infrastructure), and Cloud-Prem
  (full platform in a private VPC on AWS, GCP, or Azure)—and is SOC 2 Type II certified
  and HIPAA compliant. Teams can integrate Superblocks into their CI/CD pipelines
  using official GitHub Actions for export, import, and deployment of Superblocks
  resources, plus Terraform modules for AWS and Google Cloud.

  '
